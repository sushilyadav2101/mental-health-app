<!DOCTYPE html>
<html>
<head>
    <title>Mental Health Predictor</title>

    <!-- 🔥 CACHE FIX -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">
    <h1>Mental Health Prediction</h1>

    <form action="/predict" method="post" autocomplete="off">

        <input type="number" name="sleep" placeholder="Sleep Hours (0-12)" required>

        <input type="number" step="0.01" name="gpa" placeholder="GPA (0.0 - 10.0)" required>

        <input type="number" name="stress" placeholder="Stress Level (0-10)" required>

        <input type="number" name="anxiety" placeholder="Anxiety Score (0-10)" required>

        <input type="number" name="steps" placeholder="Steps Per Day (0-30000)" required>

        <button type="submit">Predict</button>

    </form>

    {% if prediction_text %}
        <h2>{{ prediction_text }}</h2>
    {% endif %}

</div>

</body>
</html>
